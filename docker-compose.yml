# ═══════════════════════════════════════════════════════════════════════════════
# Code-Analyser — Local Infrastructure Stack
# ═══════════════════════════════════════════════════════════════════════════════
#
# Spins up Redis, Qdrant, and Neo4j for local development.
# All images are multi-arch and run natively on Apple Silicon (ARM64).
#
# Usage:
#   docker compose up -d          # Start all services (detached)
#   docker compose ps             # Check status
#   docker compose logs -f redis  # Tail logs for a specific service
#   docker compose down           # Stop all services (volumes persist)
#   docker compose down -v        # Stop AND destroy all data volumes
#
# Service Endpoints:
#   Redis      → localhost:6379
#   Qdrant API → localhost:6333   (REST)  /  localhost:6334 (gRPC)
#   Neo4j Bolt → localhost:7687   (driver connection)
#   Neo4j UI   → http://localhost:7474  (browser — login: neo4j / password)
# ═══════════════════════════════════════════════════════════════════════════════

services:
  # ─── Redis (BullMQ Queue + Pub/Sub for SSE) ────────────────────────────────
  redis:
    image: redis:alpine
    container_name: codeanalyser-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ─── Qdrant (Vector Database — Phase 3: GraphRAG Embeddings) ───────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: codeanalyser-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:6333/healthz",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Neo4j (Graph Database — Phase 3: Knowledge Graph) ─────────────────────
  neo4j:
    image: neo4j:latest
    container_name: codeanalyser-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474" # Browser UI  → http://localhost:7474
      - "7687:7687" # Bolt protocol (driver connections)
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    environment:
      # Default auth: neo4j / password  (matches .env.example defaults)
      - NEO4J_AUTH=neo4j/password
      # Performance tuning for local dev
      - NEO4J_server_memory_heap_initial__size=256m
      - NEO4J_server_memory_heap_max__size=512m
      - NEO4J_server_memory_pagecache_size=128m
      # Disable telemetry
      - NEO4J_dbms_usage__report_enabled=false
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

# ─── Named Volumes (persist across container restarts) ────────────────────────
volumes:
  redis_data:
    driver: local
  qdrant_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
